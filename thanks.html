<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Message Sent | AI Solutions Hub</title>
 <meta name="description" content="Thank you for contacting AI Solutions Hub. We will get back to you soon.">
 <link rel="stylesheet" href="styles.css">
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
 <style>
 .thanks-container {
 min-height: 100vh;
 display: flex;
 align-items: center;
 justify-content: center;
 background: var(--bg-light);
 padding: 2rem;
 }
 
 .thanks-card {
 background: var(--bg-white);
 padding: 4rem;
 border-radius: var(--radius-xl);
 box-shadow: var(--shadow-lg);
 text-align: center;
 max-width: 500px;
 width: 100%;
 border: 1px solid var(--border-light);
 }
 
 .thanks-icon {
 font-size: 5rem;
 color: #10B981;
 margin-bottom: 1.5rem;
 animation: scale-in 0.5s ease;
 }
 
 .thanks-card h1 {
 margin-bottom: 1rem;
 color: var(--color-primary);
 }
 
 .thanks-card p {
 color: var(--text-light);
 margin-bottom: 2rem;
 font-size: 1.1rem;
 }
 
 .thanks-card .btn {
 margin: 0.5rem;
 }
 
 @keyframes scale-in {
 0% { transform: scale(0); opacity: 0; }
 50% { transform: scale(1.2); }
 100% { transform: scale(1); opacity: 1; }
 }
 </style>
</head>
<body>
 <div class="thanks-container">
 <div class="thanks-card">
 <i class="fas fa-check-circle thanks-icon"></i>
 <h1>Message Sent!</h1>
 <p>Thank you for reaching out to AI Solutions Hub. We have received your message and will get back to you within 24 hours.</p>
 <a href="index.html" class="btn btn-primary">
 <i class="fas fa-home"></i> Back to Home
 </a>
 <a href="contact.html" class="btn btn-outline">
 <i class="fas fa-envelope"></i> Send Another Message
 </a>
 </div>
 </div>
</body>
</html>
